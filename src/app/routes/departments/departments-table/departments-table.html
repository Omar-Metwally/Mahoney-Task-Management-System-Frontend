<page-header />

<app-generic-table
  [data]="data()"
  [columns]="columns"
  [totalCount]="totalCount()"
  [pageIndex]="pageIndex()"
  [pageSize]="pageSize"
  [isLoading]="isLoading()"
  [extraActions]="extraActions"
  (view)="onView($event)"
  (edit)="onEdit($event)"
  (delete)="onDelete($event)"
  (pageChange)="onPageChange($event)"
  (sortChange)="onSortChange($event)"
  (filtersApplied)="onApply()"
  (filtersReset)="onReset()"
  [showEdit]="false"
>
  <ng-template #toolbarActions>
    <button mat-flat-button color="primary" (click)="onAdd()">
      <mat-icon>add</mat-icon> New Department
    </button>
  </ng-template>

<ng-template #filterContent>
  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 8px 16px; align-items: start;">

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Search</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput [(ngModel)]="filters['searchTerm']" name="searchTerm" placeholder="Search departments..." />
    </mat-form-field>

  </div>
</ng-template>

</app-generic-table>
