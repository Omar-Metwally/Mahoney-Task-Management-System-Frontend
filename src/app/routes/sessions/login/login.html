<div class="d-flex w-full h-full">
  <mat-card class="m-auto" style="max-width: 380px">
    <mat-card-header class="m-b-24">
      <mat-card-title>Mahoney Task System</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form class="form-field-full" [formGroup]="loginForm">
        <mat-form-field appearance="outline" class="p-b-16">
          <mat-label>{{ 'email' | translate }}</mat-label>
          <input matInput placeholder="Enter Email Here" formControlName="email" required />
          @if (email.invalid) {
            <mat-error>
              @if (email.errors?.['email']) {
                <span>
                  {{ 'please_enter_email' | translate }}
                </span>
              }
              @if (email.errors?.['remote']) {
                <span>{{ email.errors?.['remote'] }}</span>
              }
            </mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ 'password' | translate }}</mat-label>
          <input
            matInput
            placeholder="Enter Password Here"
            type="password"
            formControlName="password"
            required
          />
        </mat-form-field>

        <button
          class="w-full m-y-16"
          matButton="filled"
          [disabled]="loginForm.invalid"
          [loading]="isSubmitting()"
          (click)="login()"
        >
          {{ 'login ' | translate }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
